server:
  port: 8080

spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  application:
    name: moyun-server
  profiles:
    active: local
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  # Jackson 配置 - 完整支持 Java8 日期时间
  jackson:
    serialization:
      # 关键：禁止写成时间戳数组，改为字符串
      write-dates-as-timestamps: false
      # 格式化输出
      indent-output: true
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
    # 反序列化时允许接受多种格式
    deserialization:
      # 忽略未知字段
      fail-on-unknown-properties: false

# 日志配置（公共格式，各环境共享）
logging:
  level:
    com.moyun: debug
    org.springframework: info
  pattern:
    console: '%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{50} - %msg%n'

# 安全配置
security:
  # 后台管理需要排除的路径模块（这些路径使用独立的认证配置）
  exclude-modules:  /portal/**,/external/**,/doc.html,/swagger-ui.html

# 墨韵框架配置（公共部分）
moyun:
  name: moyun
  version: 4.x
  copyrightYear: 2024
  # 实例演示开关
  demoEnabled: false
  # 获取ip地址开关
  addressEnabled: false

# Token 配置
# secret 通过环境变量 ${TOKEN_SECRET:} 注入，各环境不同密钥
# expireTime 建议本地 30 分钟，生产可在环境文件中覆盖
token:
  header: Authorization
  # 密钥必须至少 512 位 (64 字节) 用于 HS512 算法
  # 生产环境必须通过环境变量 TOKEN_SECRET 配置强随机密钥
  secret: ${TOKEN_SECRET:}

# 验证码配置
captcha:
  enabled: true
  type: math
  # 验证码字符长度
  length: 2
  # 验证码宽度
  width: 160
  # 验证码高度
  height: 60

# 用户配置
user:
  password:
    # 密码最大错误次数
    maxRetryCount: 5
    # 密码锁定时间（默认10分钟）
    lockTime: 10

# 防止XSS攻击
xss:
  # 过滤开关
  enabled: true
  # 排除链接（多个用逗号分隔）
  excludes: /system/notice
  # 匹配链接
  urlPatterns: /system/*,/monitor/*,/tool/*

# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
  production: false

# 项目配置（兼容原来的 ruoyi 配置）
ruoyi:
  name: Moyun
  version: 1.0.0
  profile: /profile
  importPath: /profile/import
  # 验证码类型 math 数字计算 char 字符验证
  captchaType: math
